apiVersion: apps/v1
kind: Deployment
metadata:
  name: forgejo-runner
spec:
  replicas: 1
  selector:
    matchLabels:
      app: forgejo-runner
  template:
    metadata:
      labels:
        app: forgejo-runner
    spec:
      initContainers:
        - name: fix-permissions
          image: busybox
          command: ["chown", "-R", "1000:1000", "/data"]
          volumeMounts:
            - name: runner-data
              mountPath: /data
        - name: register
          image: code.forgejo.org/forgejo/runner:6.3.1
          command:
            - sh
            - -c
            - |
              if [ ! -f /data/.runner ]; then
                forgejo-runner register \
                  --no-interactive \
                  --instance http://forgejo-http:3000 \
                  --token $(FORGEJO_RUNNER_REGISTRATION_TOKEN) \
                  --name k8s-runner
              fi
          env:
            - name: FORGEJO_RUNNER_REGISTRATION_TOKEN
              valueFrom:
                secretKeyRef:
                  name: forgejo-runner-secret
                  key: token
          volumeMounts:
            - name: runner-data
              mountPath: /data
      containers:
        - name: runner
          image: code.forgejo.org/forgejo/runner:6.3.1
          command: ["forgejo-runner", "daemon"]
          env:
            - name: DOCKER_HOST
              value: unix:///var/run/docker.sock
            - name: FORGEJO_RUNNER_REGISTRATION_TOKEN
              valuefrom:
                secretKeyRef:
                  name: forgejo-runner-secret
                  key: token
            - name: FORGEJO_RUNNER_INSTANCE
              value: "http://forgejo-http:3000"
          volumeMounts:
            - name: runner-data
              mountPath: /data
            - name: docker-sock
              mountPath: /ver/run
        - name: dind
          image: docker:dind
          securityContext:
            privileged: true
          env:
            - name: DOCKER_TLS_CERTDIR
              value: ""
          command: ["dockerd", "--host=unix:///var/run/docker.sock", "--host=tcp://0.0.0.0:2375", "--insecure-registry=forgejo-http:3000"]
          volumeMounts:
            - name: runner-data
              mountPath: /data
            - name: docker-sock
              mountPath: /ver/run
      volumes:
        - name: docker-sock
          empttDir: {}
        - name: runner-data
          persistentVolumeClaim:
            claimName: forgejo-runner-pvc

