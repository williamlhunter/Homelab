apiVersion: apps/v1
kind: Deployment
metadata:
  name: forgejo-runner
spec:
  replicas: 1
  selector:
    matchLabels:
      app: forgejo-runner
  template:
    metadata:
      labels:
        app: forgejo-runner
    spec:
      initContainers:
        - name: register
          image: code.forgejo.org/forgejo/runner:6.3.1
          command:
            - sh
            - -c
            - |
              if [ ! -f /data/.runner ]; then
                forgejo-runner register \
                  --no-interactive \
                  --instance http://forgejo-http:3000 \
                  --token $(FORGEJO_RUNNER_REGISTRATION_TOKEN) \
                  --name k8s-runner
              fi
          env:
            - name: FORGEJO_RUNNER_REGISTRATION_TOKEN
              valueFrom:
                secretKeyRef:
                  name: forgejo-runner-secret
                  key: token
          volumeMounts:
            - name: runner-data
              mountPath: /data
      containers:
        - name: runner
          image: code.forgejo.org/forgejo/runner:6.3.1
          env:
            - name: DOCKER_HOST
              value: tcp://localhost:2376
            - name: DOCKER_TLS_VERIFY
              value: "1"
            - name: DOCKER_CERT_PATH
              value: /certs/client
            - name: FORGEJO_RUNNER_REGISTRATION_TOKEN
              valuefrom:
                secretKeyRef:
                  name: forgejo-runner-secret
                  key: token
            - name: FORGEJO_RUNNER_INSTANCE
              value: "http://forgejo-http:3000"
          volumeMounts:
            - name: docker-certs
              mountPath: /certs/client
            - name: runner-data
              mountPath: /data
        - name: dind
          image: docker:dind
          securityContext:
            privileged: true
          env:
            - name: DOCKER_TLS_CERTDIR
              value: /certs
          volumeMounts:
            - name: docker-certs
              mountPath: /certs
            - name: runner-data
              mountPath: /data
      volumes:
        - name: docker-certs
          emptDir: {}
        - name: runner-data
          persistentVolumeClaim:
            claimName: forgejo-runner-pvc

