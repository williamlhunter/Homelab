apiVersion: apps/v1
kind: Deployment
metadata:
  name: forgejo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: forgejo
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: forgejo
    spec:
      initContainers:
        - name: fix-permissions
          image: busybox
          command: ["chown", "-R", "1000:1000", "/data"]
          volumeMounts:
            - name: data
              mountPath: /data
      containers:
        - name: forgejo
          image: codeberg.org/forgejo/forgejo:14-rootless
          ports:
            - containerPort: 3000
          volumeMounts:
            - name: data
              mountPath: /var/lib/gitea
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: forgejo-pvc
