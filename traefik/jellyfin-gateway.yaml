apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: homelab-gateway
  namespace: default
spec:
  gatewayClassName: traefik
  listeners:
    - name: https
      protocol: HTTPS
      port: 443
      hostname: "*.home.williamlhunter.com"
      tls:
        mode: Terminate
        certificateRefs:
          - name: wildcard-home-tls
