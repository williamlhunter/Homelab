apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: prowlarr
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/williamlhunter/Homelab
    targetRevision: HEAD
    path: apps/prowlarr
  destination:
    server: https://kubernetes.default.svc
    namespace: default
