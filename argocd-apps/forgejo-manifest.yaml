apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: forgejo
  namespace: default
spec:
  project: default
  source:
    repoURL: https://github.com/williamlhunter/Homelab
    targetRevision: HEAD
    path: infra/forgejo
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
