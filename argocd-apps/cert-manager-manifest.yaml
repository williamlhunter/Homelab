apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cert-manager
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/williamlhunter/Homelab
    targetRevision: HEAD
    path: infra/cert-manager
  destination:
    server: https://kubernetes.default.svc
    namespace: cert-manger
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
